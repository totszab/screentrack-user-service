spring:
  application:
    name: user-service

  datasource:
    url: jdbc:postgresql://localhost:5432/screentrack
    username: postgres
    password: postgres

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

server:
  port: 8081